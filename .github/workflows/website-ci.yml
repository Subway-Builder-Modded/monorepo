name: Website CI

on:
  push:
    branches:
      - main
      - website-dev
    paths:
      - "website-dev/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/website-ci.yml"
  pull_request:
    branches:
      - main
      - website-dev
    paths:
      - "website-dev/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/website-ci.yml"
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Check Code Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Run quality control checks
        run: pnpm run check
