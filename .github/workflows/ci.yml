name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend_quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: railyard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: railyard/go.sum

      - name: Run backend quality checks
        run: bash ./scripts/backend-quality.sh

  frontend_quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: railyard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: railyard/frontend/pnpm-lock.yaml

      - name: Verify pnpm
        run: pnpm --version

      - name: Install frontend dependencies
        working-directory: railyard/frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend quality checks
        run: bash ./scripts/frontend-quality.sh
