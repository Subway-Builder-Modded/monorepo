name: RailyardRelease

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  VERSION: ${{ github.ref_name }}

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: railyard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: railyard/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/Library/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Update version in wails.json
        run: node scripts/update_wails_json.js

      - name: Build macOS (universal)
        run: |
          printf '%s' "$VERSION" > internal/constants/version.txt
          wails build -platform darwin/universal
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent railyard.app railyard-${VERSION}-macos-universal.zip

      - name: Free up Space for DMG Creation
        run: |
          rm -rf frontend/node_modules

      - name: Create DMG
        run: |
          hdiutil create -volname "Railyard" -srcfolder build/bin/railyard.app -ov -format UDZO build/bin/railyard-${VERSION}-macos-universal.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            railyard/build/bin/railyard-${{ env.VERSION }}-macos-universal.dmg
            railyard/build/bin/railyard-${{ env.VERSION }}-macos-universal.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: railyard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: railyard/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install Linux dependencies
        working-directory: .
        run: |
          sudo add-apt-repository -y ppa:flatpak/stable
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev flatpak flatpak-builder appstream appstream-util
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y org.gnome.Platform//47 org.gnome.Sdk//47 org.freedesktop.Sdk.Extension.golang//24.08

      - name: Install backend dependencies
        run: |
          go mod tidy
          go mod vendor

      - name: Install frontend dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: railyard/frontend
        run: pnpm run build

      - name: Update version in wails.json
        run: node scripts/update_wails_json.js

      - name: Build Linux (amd64 current)
        run: |
          printf '%s' "$VERSION" > internal/constants/version.txt
          cp build/linux/org.SBM.Railyard.yml .
          flatpak-builder --force-clean --repo="./out" build/build-linux org.SBM.Railyard.yml
          mkdir -p build/bin
          flatpak build-bundle out ./build/bin/railyard-${VERSION}-current-linux-amd64.flatpak org.SBM.Railyard

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts-${{matrix.type}}
          path: railyard/build/bin/railyard-${{ env.VERSION }}-current-linux-amd64.flatpak

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: railyard
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: railyard/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: $HOME/AppData/Local/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install NSIS
        working-directory: .
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            choco install nsis --no-progress -y
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -lt 3) { Start-Sleep 15 }
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Update version in wails.json
        run: node scripts/update_wails_json.js

      - name: Build Windows (${{ matrix.arch }}) with NSIS installer
        run: |
          chcp 65001
          $Env:VERSION | Set-Content internal/constants/version.txt -NoNewline
          wails build -platform windows/${{ matrix.arch }} -nsis

      - name: Rename artifacts
        run: |
          Move-Item build\bin\railyard-${{ matrix.arch }}-installer.exe build\bin\railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-installer.exe
          Compress-Archive -Path build\bin\railyard.exe -DestinationPath build\bin\railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-artifacts
          path: |
            railyard/build/bin/railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-installer.exe
            railyard/build/bin/railyard-${{ env.VERSION }}-windows-${{ matrix.arch }}-portable.zip

  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: ${{!contains(github.ref_name, '+rc')}}
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{contains(github.ref_name, '+rc')}}
          generate_release_notes: true
          files: |
            railyard-${{ env.VERSION }}-macos-universal.dmg
            railyard-${{ env.VERSION }}-macos-universal.zip
            railyard-${{ env.VERSION }}-current-linux-amd64.flatpak
            railyard-${{ env.VERSION }}-windows-amd64-installer.exe
            railyard-${{ env.VERSION }}-windows-amd64-portable.zip
            railyard-${{ env.VERSION }}-windows-arm64-installer.exe
            railyard-${{ env.VERSION }}-windows-arm64-portable.zip
