name: Website Deploy (Prod)

on:
  push:
    branches:
      - main
    paths:
      - "website-dev/**"
      - "packages/**"
      - ".github/workflows/website-deploy.yml"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: deploy-subway-builder-site
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website-dev
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/website-dev/build
          key: ${{ runner.os }}-website-vite-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('website-dev/**/*.js', 'website-dev/**/*.jsx', 'website-dev/**/*.ts', 'website-dev/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-website-vite-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Fetch registry site data
        env:
          SBM_GITHUB_TOKEN: ${{ secrets.SBM_GITHUB_TOKEN }}
        run: pnpm run fetch

      - name: Build
        run: pnpm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./website-dev/build/client
          force_orphan: true
          cname: subwaybuildermodded.com
