name: Website Deploy (Prod)

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - "packages/**"
      - ".github/workflows/website-deploy.yml"
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: deploy-subway-builder-site
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    env:
      CLOUDFLARE_ZONE_TAG: ${{ secrets.CLOUDFLARE_ZONE_TAG }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/website/.next/cache
          key: ${{ runner.os }}-website-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('website/**/*.js', 'website/**/*.jsx', 'website/**/*.ts', 'website/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-website-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Verify analytics secrets
        shell: bash
        run: |
          zone_present=no
          token_present=no

          if [ -n "${CLOUDFLARE_ZONE_TAG}${CLOUDFLARE_ZONE_ID}" ]; then
            zone_present=yes
          fi

          if [ -n "${CLOUDFLARE_API_TOKEN}${CLOUDFLARE_TOKEN}${CF_API_TOKEN}" ]; then
            token_present=yes
          fi

          echo "Cloudflare zone present: ${zone_present}"
          echo "Cloudflare token present: ${token_present}"

      - name: Build for route discovery
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Generate analytics
        env:
          WEBSITE_PATH_SOURCE_DIR: ${{ github.workspace }}/website/out
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run analytics

      - name: Verify analytics refresh
        shell: bash
        run: |
          node -e "
            const fs = require('node:fs');

            function readJson(path) {
              return JSON.parse(fs.readFileSync(path, 'utf8'));
            }

            const registryMeta = readJson('public/registry/analytics/snapshot-meta.json');
            const railyardMeta = readJson('public/railyard/analytics/snapshot-meta.json');

            const registryFiles = Array.isArray(registryMeta.files) ? registryMeta.files.length : 0;
            const railyardFiles = Array.isArray(railyardMeta.files) ? railyardMeta.files.length : 0;

            if (registryFiles === 0 || railyardFiles === 0) {
              console.error('[deploy] Analytics refresh verification failed.');
              console.error('[deploy] registry files refreshed:', registryFiles);
              console.error('[deploy] railyard files refreshed:', railyardFiles);
              process.exit(1);
            }

            console.log('[deploy] Analytics refresh verified.');
            console.log('[deploy] registry files refreshed:', registryFiles);
            console.log('[deploy] railyard files refreshed:', railyardFiles);
          "

      - name: Build
        env:
          RAILYARD_GITHUB_TOKEN: ${{ secrets.RAILYARD_GITHUB_TOKEN }}
        run: pnpm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./website/out
          force_orphan: true
          cname: subwaybuildermodded.com
