name: Packages CI

on:
  pull_request:
    branches:
      - main
      - website-dev
    paths:
      - "packages/**"
      - "website/**"
      - "railyard/frontend/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/packages-ci.yml"
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "website/**"
      - "railyard/frontend/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/packages-ci.yml"
  workflow_dispatch:

concurrency:
  group: packages-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package-manifests:
    name: Validate Package Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate workspace package exports
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const packagesDir = path.join(process.cwd(), 'packages');
          const packageDirs = fs.readdirSync(packagesDir, { withFileTypes: true })
            .filter((d) => d.isDirectory())
            .map((d) => path.join(packagesDir, d.name));

          const errors = [];

          for (const dir of packageDirs) {
            const pkgPath = path.join(dir, 'package.json');
            if (!fs.existsSync(pkgPath)) {
              errors.push(`Missing package.json: ${pkgPath}`);
              continue;
            }

            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            if (!pkg.name || !pkg.name.startsWith('@subway-builder-modded/')) {
              errors.push(`Invalid package name in ${pkgPath}: ${pkg.name ?? '<missing>'}`);
            }

            if (!pkg.exports || !pkg.exports['.']) {
              errors.push(`Missing exports['.'] in ${pkgPath}`);
              continue;
            }

            const rootExport = pkg.exports['.'];
            const exportTargets = [rootExport.types, rootExport.default].filter(Boolean);

            if (exportTargets.length === 0) {
              errors.push(`Missing exports targets in ${pkgPath}`);
              continue;
            }

            for (const rel of exportTargets) {
              const fullPath = path.join(dir, rel);
              if (!fs.existsSync(fullPath)) {
                errors.push(`Missing export target for ${pkg.name}: ${rel}`);
              }
            }
          }

          if (errors.length > 0) {
            console.error('Package manifest validation failed:');
            for (const err of errors) console.error(`- ${err}`);
            process.exit(1);
          }

          console.log(`Validated ${packageDirs.length} package manifests.`);
          NODE

  package-typecheck:
    name: Typecheck Shared Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck package tsconfigs
        shell: bash
        run: |
          pnpm --dir website exec tsc --noEmit -p ../packages/shared-ui/tsconfig.json
          pnpm --dir website exec tsc --noEmit -p ../packages/asset-listings-ui/tsconfig.json
