name: Apply Issue Labels and Priority

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write

jobs:
  apply-issue-labels-and-priority:
    name: Apply Issue Labels and Priority
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels and priority from issue form
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;

            if (!issue?.body) {
              core.info("No issue body found. Skipping.");
              return;
            }

            const PRIORITY_FIELD_ID = 39564094;

            const labelSections = {
              Projects: {
                General: "general",
                Internal: "internal",
                Depot: "depot",
                Locomotive: "locomotive",
                Railyard: "railyard",
                Registry: "registry",
                "Template Mod": "template-mod",
                Website: "website",
              },
              Type: {
                Bug: "bug",
                Task: "task",
                Feature: "feature",
              },
              Area: {
                Frontend: "frontend",
                Backend: "backend",
                Documentation: "documentation",
              },
              Other: {
                "Big Change": "big-change",
                Blocked: "blocked",
                "Long Term": "long-term",
              },
            };

            const priorities = new Set(["Urgent", "High", "Medium", "Low"]);

            const escapeRegex = (value) =>
              value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

            const getSection = (sectionName) => {
              const escapedName = escapeRegex(sectionName);
              const match = issue.body.match(
                new RegExp(`###\\s+${escapedName}\\s*\\r?\\n([\\s\\S]*?)(?=\\r?\\n###\\s+|$)`, "i")
              );

              return match?.[1]?.trim() ?? "";
            };

            const getCheckedOptions = (sectionName) => {
              return [...getSection(sectionName).matchAll(/^\s*-\s*\[[xX]\]\s*(.+?)\s*$/gm)]
                .map((match) => match[1].trim())
                .filter(Boolean);
            };

            const getPriority = () => {
              return getSection("Priority")
                .split(/\r?\n/)
                .map((line) => line.trim())
                .find((line) => priorities.has(line));
            };

            const managedLabels = new Set(
              Object.values(labelSections).flatMap((section) => Object.values(section))
            );

            const selectedLabels = new Set();

            for (const [sectionName, labels] of Object.entries(labelSections)) {
              for (const option of getCheckedOptions(sectionName)) {
                const label = labels[option];

                if (label) {
                  selectedLabels.add(label);
                }
              }
            }

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            const currentManagedLabels = currentLabels
              .map((label) => label.name)
              .filter((name) => managedLabels.has(name.toLowerCase()));

            const labelsToAdd = [...selectedLabels].filter(
              (name) =>
                !currentManagedLabels.some(
                  (current) => current.toLowerCase() === name.toLowerCase()
                )
            );

            const labelsToRemove = currentManagedLabels.filter(
              (name) => !selectedLabels.has(name.toLowerCase())
            );

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd,
              });
            }

            for (const labelName of labelsToRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: labelName,
              });
            }

            const priority = getPriority();

            if (priority) {
              await github.request(
                "POST /repos/{owner}/{repo}/issues/{issue_number}/issue-field-values",
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  issue_field_values: [
                    {
                      field_id: PRIORITY_FIELD_ID,
                      value: priority,
                    },
                  ],
                  headers: {
                    Accept: "application/vnd.github+json",
                    "X-GitHub-Api-Version": "2026-03-10",
                  },
                }
              );
            }

            core.info(
              `Added labels: ${labelsToAdd.join(", ") || "none"}; ` +
              `removed labels: ${labelsToRemove.join(", ") || "none"}; ` +
              `priority: ${priority || "none"}`
            );
            