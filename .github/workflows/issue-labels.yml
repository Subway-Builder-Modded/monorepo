name: Apply Issue Labels and Priority

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write

jobs:
  apply-issue-labels-and-priority:
    name: Apply Issue Labels and Priority
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels and priority from issue form
        uses: actions/github-script@v7
        env:
          PRIORITY_ISSUE_FIELD_ID: ${{ vars.PRIORITY_ISSUE_FIELD_ID }}
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue || !issue.body) {
              core.info("No issue body found. Skipping.");
              return;
            }

            const labelSections = new Map([
              ["Projects", new Map([
                ["General", "general"],
                ["Internal", "internal"],
                ["Depot", "depot"],
                ["Locomotive", "locomotive"],
                ["Railyard", "railyard"],
                ["Registry", "registry"],
                ["Template Mod", "template-mod"],
                ["Website", "website"],
              ])],
              ["Type", new Map([
                ["Bug", "bug"],
                ["Task", "task"],
                ["Feature", "feature"],
              ])],
              ["Area", new Map([
                ["Frontend", "frontend"],
                ["Backend", "backend"],
                ["Documentation", "documentation"],
              ])],
              ["Other", new Map([
                ["Big Change", "big-change"],
                ["Blocked", "blocked"],
                ["Long Term", "long-term"],
              ])],
            ]);

            const priorityOptions = new Set(["Urgent", "High", "Medium", "Low"]);

            const getSection = (sectionName) => {
              const escapedName = sectionName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
              const sectionMatch = issue.body.match(new RegExp(`###\\s+${escapedName}\\s*([\\s\\S]*?)(?:\\n###\\s+|$)`, "i"));
              return sectionMatch?.[1] ?? "";
            };

            const getCheckedOptions = (sectionName) => {
              const section = getSection(sectionName);
              return [...section.matchAll(/^\s*-\s*\[[xX]\]\s*(.+?)\s*$/gm)]
                .map((match) => match[1].trim())
                .filter(Boolean);
            };

            const getSelectedOption = (sectionName, allowedOptions) => {
              return getSection(sectionName)
                .split(/\r?\n/)
                .map((line) => line.trim())
                .find((line) => allowedOptions.has(line));
            };

            const managedLabels = new Set([...labelSections.values()].flatMap((labels) => [...labels.values()]));
            const selectedLabels = [...new Set(
              [...labelSections.entries()].flatMap(([sectionName, labels]) =>
                getCheckedOptions(sectionName)
                  .map((option) => labels.get(option))
                  .filter(Boolean)
              )
            )];

            const selectedPriority = getSelectedOption("Priority", priorityOptions);

            const { data: currentIssueLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            });

            const currentManagedLabels = currentIssueLabels
              .map((label) => label.name)
              .filter((name) => managedLabels.has(name.toLowerCase()));

            const labelsToAdd = selectedLabels
              .filter((name) => !currentManagedLabels.some((current) => current.toLowerCase() === name));

            const labelsToRemove = currentManagedLabels
              .filter((name) => !selectedLabels.includes(name.toLowerCase()));

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd,
              });
            }

            for (const labelName of labelsToRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                name: labelName,
              });
            }

            const updateIssuePriority = async (priorityName) => {
              if (!priorityName) {
                core.info("No Priority option selected. Skipping issue priority update.");
                return;
              }

              const priorityFieldId = process.env.PRIORITY_ISSUE_FIELD_ID?.trim();
              if (!priorityFieldId) {
                core.info("PRIORITY_ISSUE_FIELD_ID is not configured. Skipping issue priority update.");
                return;
              }

              await github.request("POST /repos/{owner}/{repo}/issues/{issue_number}/issue-field-values", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                issue_field_values: [
                  {
                    field_id: priorityFieldId,
                    value: priorityName,
                  },
                ],
                headers: {
                  "X-GitHub-Api-Version": "2022-11-28",
                },
              });

              core.info(`Updated issue Priority field to "${priorityName}".`);
            };

            await updateIssuePriority(selectedPriority);

            core.info(
              `Added labels: ${labelsToAdd.join(", ") || "none"}; removed labels: ${labelsToRemove.join(", ") || "none"}; priority: ${selectedPriority || "none"}`
            );
